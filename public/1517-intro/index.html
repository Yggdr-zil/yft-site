<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joseph "Bear" Januszewski — Yggdrasil Financial Technologies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy:      #1B2A4A;
            --navy-dark: #0c1624;
            --gold:      #C5952A;
            --gold-dim:  rgba(197,149,42,0.35);
            --tp:        rgba(255,255,255,0.92);
            --tm:        rgba(255,255,255,0.55);
            --ts:        rgba(255,255,255,0.38);
            --fd: 'Cormorant Garamond', Georgia, serif;
            --fs: 'IBM Plex Sans', system-ui, sans-serif;
        }

        body {
            background: var(--navy-dark);
            color: var(--tp);
            font-family: var(--fs);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(2rem, 5vw, 4rem) clamp(1.5rem, 4vw, 3rem);
        }

        .wrap {
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(1.8rem, 3.5vh, 3rem);
        }

        /* Logo + header */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.9rem;
            text-align: center;
        }

        .logo-mark {
            width: clamp(2.2rem, 4vw, 3rem);
            height: auto;
            opacity: 0.9;
        }

        .rule {
            width: clamp(2.5rem, 6vw, 4rem);
            height: 1px;
            background: var(--gold-dim);
        }

        .label {
            font-size: clamp(0.6rem, 0.85vw, 0.72rem);
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
        }

        h1 {
            font-family: var(--fd);
            font-size: clamp(1.6rem, 3.5vw, 2.6rem);
            font-weight: 500;
            color: var(--tp);
            line-height: 1.2;
            letter-spacing: 0.01em;
        }

        .sub {
            font-size: clamp(0.8rem, 1.2vw, 0.95rem);
            color: var(--tm);
            font-weight: 300;
            letter-spacing: 0.04em;
        }

        /* Video container */
        .video-wrap {
            width: 100%;
            position: relative;
            border: 1px solid var(--gold-dim);
            border-radius: 4px;
            overflow: hidden;
            background: var(--navy);
            aspect-ratio: 16 / 9;
        }

        .video-wrap video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* Placeholder shown when no video src */
        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            color: var(--tm);
            font-size: 0.85rem;
            letter-spacing: 0.06em;
        }

        .video-placeholder .play-icon {
            width: 3.5rem;
            height: 3.5rem;
            border: 1.5px solid var(--gold-dim);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-placeholder .play-icon::after {
            content: '';
            border-left: 14px solid rgba(197,149,42,0.5);
            border-top: 9px solid transparent;
            border-bottom: 9px solid transparent;
            margin-left: 4px;
        }

        /* CTA */
        .cta-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.7rem;
            text-align: center;
        }

        .cta-note {
            font-size: clamp(0.75rem, 1vw, 0.85rem);
            color: var(--ts);
            font-weight: 300;
        }

        .cta-link {
            display: inline-flex;
            align-items: center;
            gap: 0.6em;
            padding: 0.75em 1.8em;
            border: 1px solid var(--gold-dim);
            color: var(--gold);
            text-decoration: none;
            font-size: clamp(0.78rem, 1.1vw, 0.88rem);
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: background 0.2s, border-color 0.2s;
        }

        .cta-link:hover {
            background: rgba(197,149,42,0.07);
            border-color: rgba(197,149,42,0.55);
        }

        .cta-link .arrow {
            font-style: normal;
            transition: transform 0.2s;
        }

        .cta-link:hover .arrow {
            transform: translateX(3px);
        }

        /* Footer */
        .footer {
            font-size: 0.72rem;
            color: var(--ts);
            letter-spacing: 0.06em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrap">

        <div class="header">
            <span class="label">Yggdrasil Financial Technologies</span>
            <div class="rule"></div>
            <h1>Joseph &ldquo;Bear&rdquo; Januszewski</h1>
            <p class="sub">Founder &amp; CEO &nbsp;·&nbsp; Patent Pending &nbsp;·&nbsp; Delaware C-Corp</p>
        </div>

        <div class="video-wrap">
            <!-- DROP VIDEO FILE: place intro.mp4 in this directory, then uncomment below -->
            <!--
            <video controls preload="metadata" poster="poster.jpg">
                <source src="intro.mp4" type="video/mp4">
            </video>
            -->
            <div class="video-placeholder">
                <div class="play-icon"></div>
                <span>Introduction · ~90 sec</span>
            </div>
        </div>

        <div class="cta-wrap">
            <p class="cta-note">Seed Round &nbsp;·&nbsp; $3M &nbsp;·&nbsp; $12M Pre-Money &nbsp;·&nbsp; March 2026</p>
            <a class="cta-link" href="/1517-deck/">
                View the Deck <span class="arrow">→</span>
            </a>
        </div>

        <p class="footer">Confidential &nbsp;·&nbsp; For 1517 Fund only</p>

    </div>
</body>
</html>
