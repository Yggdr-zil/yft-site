<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VC Telemetry Viewer — Yggdrasil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c1624;
      color: #f0ece4;
      font-family: 'IBM Plex Mono', 'Fira Code', monospace;
      font-size: 13px;
      padding: 24px;
      min-height: 100vh;
    }
    h1 {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      color: #C5952A;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .sub {
      color: rgba(240,236,228,0.45);
      font-size: 0.75rem;
      margin-bottom: 24px;
    }
    .auth-row {
      display: flex; gap: 8px; margin-bottom: 24px; align-items: center;
    }
    input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(197,149,42,0.25);
      border-radius: 4px;
      color: #f0ece4;
      padding: 7px 12px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      width: 360px;
    }
    input:focus { border-color: rgba(197,149,42,0.6); }
    input::placeholder { color: rgba(240,236,228,0.3); }
    button {
      background: #C5952A;
      border: none; border-radius: 4px;
      color: #0c1624;
      font-size: 12px; font-weight: 600;
      padding: 7px 16px; cursor: pointer;
    }
    button:hover { background: #d4a53a; }
    button:disabled { background: rgba(197,149,42,0.3); cursor: default; }

    .err { color: #f87171; margin-bottom: 16px; font-size: 0.8rem; }

    .section {
      margin-bottom: 32px;
    }
    .section h2 {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(240,236,228,0.7);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(197,149,42,0.15);
    }

    .stats {
      display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(197,149,42,0.15);
      border-radius: 6px;
      padding: 10px 16px;
    }
    .stat-val {
      font-size: 1.4rem;
      color: #C5952A;
      font-weight: 500;
    }
    .stat-label {
      color: rgba(240,236,228,0.45);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      color: rgba(240,236,228,0.45);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 8px;
      border-bottom: 1px solid rgba(197,149,42,0.15);
    }
    td {
      padding: 5px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .ts { color: rgba(240,236,228,0.45); font-size: 0.78rem; white-space: nowrap; }
    .fund { color: #C5952A; font-weight: 500; }
    .event { color: #34d399; }
    .event.login { color: #60a5fa; }
    .event.deck_view { color: #a78bfa; }
    .event.page_view { color: #34d399; }
    .event.gpu_view { color: #f59e0b; }
    .page { color: rgba(240,236,228,0.65); font-size: 0.8rem; }
    .ip { color: rgba(240,236,228,0.3); font-size: 0.75rem; }

    .empty { color: rgba(240,236,228,0.35); padding: 16px 0; font-size: 0.85rem; }
  </style>
</head>
<body>

<h1>VC Telemetry Viewer</h1>
<p class="sub">Dashboard events · Deck events &nbsp;·&nbsp; Admin access required</p>

<div class="auth-row">
  <input id="admin-token" type="password" placeholder="TELEMETRY_ADMIN_TOKEN" />
  <button id="load-btn">Load Events</button>
</div>
<div id="err" class="err" style="display:none"></div>

<div id="content" style="display:none">

  <!-- Summary stats -->
  <div class="section">
    <h2>Overview</h2>
    <div class="stats" id="stats"></div>
  </div>

  <!-- Per-fund summary -->
  <div class="section">
    <h2>Fund Activity</h2>
    <table id="fund-table">
      <thead><tr>
        <th>Fund</th>
        <th>Logins</th>
        <th>Deck</th>
        <th>Slides</th>
        <th>Playbook</th>
        <th>One-Pager</th>
        <th>Dashboard</th>
        <th>Last Seen</th>
      </tr></thead>
      <tbody id="fund-tbody"></tbody>
    </table>
  </div>

  <!-- Raw event log -->
  <div class="section">
    <h2>Event Log <span id="event-count" style="color:rgba(240,236,228,0.35);font-weight:400"></span></h2>
    <table id="events-table">
      <thead><tr>
        <th>Time</th>
        <th>Source</th>
        <th>Fund</th>
        <th>Event</th>
        <th>Page / Detail</th>
        <th>IP</th>
      </tr></thead>
      <tbody id="events-tbody"></tbody>
    </table>
  </div>

</div>

<script>
// ── Config — update these to match your setup ─────────────────────────────
// In production (nginx), both APIs are served on the same origin.
// Locally, the yft-site server runs on port 3001 with CORS *, so use absolute URL.
const DASH_API   = '/api/v1/telemetry/events';            // cm dashboard — Bearer auth
const DECK_API   = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:3001/api/admin/log'                  // local dev — direct to yft-site
  : '/api/admin/log';                                      // production — via nginx proxy

// ── Helpers ───────────────────────────────────────────────────────────────
function fmt(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}

async function fetchDash(token) {
  const r = await fetch(DASH_API, {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!r.ok) throw new Error(`${r.status} from ${DASH_API}`);
  const data = await r.json();
  return Array.isArray(data) ? data : [];
}

async function fetchDeck(token) {
  // yft-site uses HTTP Basic auth: admin:{token}
  const creds = btoa('admin:' + token);
  const r = await fetch(DECK_API, {
    headers: { Authorization: 'Basic ' + creds }
  });
  if (!r.ok) throw new Error(`${r.status} from ${DECK_API}`);
  const data = await r.json();
  // yft-site wraps events: { events: [...] }
  return Array.isArray(data) ? data : (Array.isArray(data.events) ? data.events : []);
}

// ── Load + Render ─────────────────────────────────────────────────────────
async function load() {
  const token = document.getElementById('admin-token').value.trim();
  if (!token) { showErr('Enter the admin token first.'); return; }
  const btn = document.getElementById('load-btn');
  btn.disabled = true; btn.textContent = 'Loading…';
  document.getElementById('err').style.display = 'none';

  let dashEvents = [], deckEvents = [];

  try {
    dashEvents = await fetchDash(token);
  } catch (e) {
    console.warn('Dashboard events unavailable:', e.message);
  }

  try {
    deckEvents = await fetchDeck(token);
  } catch (e) {
    console.warn('Deck events unavailable:', e.message);
  }

  // Fetch registered funds dynamically
  try {
    const fundsApi = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:3001/api/admin/funds' : '/api/admin/funds';
    const creds = btoa('admin:' + token);
    const fr = await fetch(fundsApi, { headers: { Authorization: 'Basic ' + creds } });
    if (fr.ok) {
      const fd = await fr.json();
      KNOWN_FUNDS = (fd.funds || []).map(f => f.id).filter(id => !id.startsWith('test'));
    }
  } catch (e) {
    console.warn('Funds list unavailable:', e.message);
  }

  btn.disabled = false; btn.textContent = 'Refresh';

  // Tag source
  dashEvents.forEach(e => e._src = 'dashboard');
  deckEvents.forEach(e => e._src = 'deck');

  // Merge + sort newest first
  const all = [...dashEvents, ...deckEvents].sort((a, b) =>
    (b.ts || '').localeCompare(a.ts || '')
  );

  renderStats(all);
  renderFundTable(all);
  renderEventLog(all);
  document.getElementById('content').style.display = 'block';
}

function renderStats(events) {
  const funds = new Set(events.map(e => e.fund).filter(Boolean));
  const logins = events.filter(e => e.event === 'login' || e.event === 'portal_login').length;
  const deckViews = events.filter(e => e.event === 'deck_view').length;
  const slideViews = events.filter(e => e.event === 'slide_view').length;
  const dashViews = events.filter(e => e.event === 'page_view').length;
  const gpuViews  = events.filter(e => e.event === 'gpu_view').length;
  const provViews = events.filter(e => e.event === 'provider_view').length;
  const playbookViews = events.filter(e => e.event === 'portal_view_playbook').length;
  const onepagerViews = events.filter(e => e.event === 'portal_view_onepager').length;

  const el = document.getElementById('stats');
  el.innerHTML = [
    [funds.size, 'Unique Funds'],
    [logins,     'Logins'],
    [deckViews,  'Deck Views'],
    [slideViews, 'Slide Views'],
    [playbookViews, 'Playbook Views'],
    [onepagerViews, 'One-Pager Views'],
    [dashViews,  'Dashboard Pages'],
    [gpuViews,   'GPU Views'],
    [provViews,  'Provider Views'],
    [events.length, 'Total Events'],
  ].map(([v, l]) => `
    <div class="stat">
      <div class="stat-val">${v}</div>
      <div class="stat-label">${l}</div>
    </div>
  `).join('');
}

let KNOWN_FUNDS = [];

function renderFundTable(events) {
  const funds = {};
  KNOWN_FUNDS.forEach(f => { funds[f] = { logins:0, deckViews:0, slideViews:0, playbookViews:0, onepagerViews:0, dashViews:0, gpuViews:0, lastSeen:'', maxSlide:0 }; });
  events.forEach(e => {
    const f = e.fund || '(unknown)';
    if (!funds[f]) funds[f] = { logins:0, deckViews:0, slideViews:0, playbookViews:0, onepagerViews:0, dashViews:0, gpuViews:0, lastSeen:'', maxSlide:0 };
    const rec = funds[f];
    if (e.event === 'login' || e.event === 'portal_login') rec.logins++;
    if (e.event === 'deck_view')             rec.deckViews++;
    if (e.event === 'slide_view')            { rec.slideViews++; const s = e.metadata?.slide || 0; if (s > rec.maxSlide) rec.maxSlide = s; }
    if (e.event === 'portal_view_playbook')  rec.playbookViews++;
    if (e.event === 'portal_view_onepager')  rec.onepagerViews++;
    if (e.event === 'page_view')             rec.dashViews++;
    if (e.event === 'gpu_view')              rec.gpuViews++;
    if (!rec.lastSeen || e.ts > rec.lastSeen) rec.lastSeen = e.ts;
  });

  const rows = Object.entries(funds)
    .sort((a, b) => (b[1].lastSeen || '').localeCompare(a[1].lastSeen || ''))
    .map(([fund, r]) => {
      const slideInfo = r.slideViews > 0 ? `${r.slideViews} (→s${r.maxSlide})` : '—';
      return `
      <tr>
        <td class="fund">${fund}</td>
        <td>${r.logins || '—'}</td>
        <td>${r.deckViews || '—'}</td>
        <td>${slideInfo}</td>
        <td>${r.playbookViews || '—'}</td>
        <td>${r.onepagerViews || '—'}</td>
        <td>${r.dashViews || '—'}</td>
        <td class="ts">${fmt(r.lastSeen)}</td>
      </tr>
    `}).join('');

  document.getElementById('fund-tbody').innerHTML = rows ||
    '<tr><td colspan="8" class="empty">No fund activity yet.</td></tr>';
}

function fmtDetail(e) {
  const m = e.metadata || {};
  switch (e.event) {
    case 'slide_view':
      return `Slide ${m.slide || '?'}/${m.total || '?'}: ${m.name || ''}${m.direction ? ' (' + m.direction + ')' : ''}`;
    case 'portal_view_deck':     return 'Opened Deck tab';
    case 'portal_view_playbook': return 'Opened Playbook tab';
    case 'portal_view_onepager': return 'Opened One-Pager tab';
    case 'portal_view_contact':  return 'Opened Contact tab';
    case 'portal_dashboard_open': return 'Opened Dashboard';
    case 'portal_deck_download': return 'Downloaded Deck' + (m.fund ? ' (' + m.fund + ')' : '');
    case 'portal_login':         return 'Portal login';
    case 'portal_view':          return 'Portal resumed';
    case 'gpu_view':             return m.gpu || e.page || '';
    case 'provider_view':        return m.provider || e.page || '';
    case 'page_view':            return e.page || '';
    case 'deck_view':            return e.page || '';
    case 'login':                return 'Fund login';
    default:
      if (e.page) return e.page;
      if (m.detail) return m.detail;
      return Object.keys(m).length ? JSON.stringify(m) : '—';
  }
}

function renderEventLog(events) {
  document.getElementById('event-count').textContent = `(${events.length})`;

  const rows = events.map(e => {
    const detail = fmtDetail(e);
    return `
      <tr>
        <td class="ts">${fmt(e.ts)}</td>
        <td style="color:rgba(240,236,228,0.4);font-size:0.75rem">${e._src}</td>
        <td class="fund">${e.fund || '—'}</td>
        <td class="event ${e.event || ''}">${e.event || '—'}</td>
        <td class="page">${detail}</td>
        <td class="ip">${e.ip || '—'}</td>
      </tr>
    `;
  }).join('');

  document.getElementById('events-tbody').innerHTML = rows ||
    '<tr><td colspan="6" class="empty">No events found.</td></tr>';
}

// ── Wire up ───────────────────────────────────────────────────────────────
document.getElementById('load-btn').addEventListener('click', load);
document.getElementById('admin-token').addEventListener('keydown', e => {
  if (e.key === 'Enter') load();
});
// Auto-load if token passed via URL hash (e.g., from admin portal)
if (location.hash && location.hash.length > 1) {
  document.getElementById('admin-token').value = decodeURIComponent(location.hash.slice(1));
  load();
}
</script>
</body>
</html>
