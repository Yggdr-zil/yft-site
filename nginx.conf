server {
    listen       ${PORT};
    server_name  _;
    port_in_redirect off;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── Auth + Telemetry + Admin → Node.js server ────────────────────────────
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/telemetry/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Contact form → Node.js server ────────────────────────────────────────
    location /api/contact {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Live API → Cloudflare Tunnel (laptop:8001) ────────────────────────────
    # Set UPSTREAM_API env var to your Cloudflare Tunnel URL, e.g.:
    #   UPSTREAM_API=https://api.yggfin.tech
    # Uses a variable + resolver so nginx resolves the host lazily at request
    # time (not at startup), preventing "host not found" crash when the tunnel
    # is offline. Returns 502 when the tunnel is down — obvious, not silent.
    location /api/v1/ {
        set $upstream_api ${UPSTREAM_API};
        resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=off;
        proxy_pass $upstream_api;
        # Use the upstream tunnel's own hostname, not $http_host (yggfin.tech).
        # Passing Host: yggfin.tech to the trycloudflare.com tunnel causes
        # Cloudflare to apply yggfin.tech's WAF rules, resulting in a 403.
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Pre-built JSON books (static, updated by push_books.sh) ─────────────
    location /books/ {
        alias /usr/share/nginx/html/books/;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # ── Dynamic portal serving (except admin — served as static) ──────────────
    location ~ ^/portal/(?!admin)([a-z0-9-]+)/?$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Dynamic deck serving ───────────────────────────────────────────────────
    location ~ ^/([a-z0-9-]+)-deck/?$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Investor portal (admin + static assets) ───────────────────────────────
    location /portal/ {
        alias /usr/share/nginx/html/portal/;
        try_files $uri $uri/ =404;
        location ~* /portal/.*\.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Shared documents (PDFs) — no cache so updates propagate instantly ────
    location /docs/ {
        alias /usr/share/nginx/html/docs/;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ── Live dashboard (React build, deployed by deploy_dashboard.sh) ────────
    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;
        # No cache on the HTML shell (JS/CSS assets have immutable hashes)
        location ~* /dashboard/.*\.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Static assets (JS, CSS, images) — long-term immutable cache ─────────
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Marketing site + VC deck subfolders ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
